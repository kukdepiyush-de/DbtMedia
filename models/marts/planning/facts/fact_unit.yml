version: 2

models:
  - name: fact_unit
    description: "Fact table for media unit performance."

    semantic_model:
      enabled: true

    agg_time_dimension: spot_date

    columns:

      - name: unit_id
        entity:
          name: unit
          type: primary

      - name: plan_id
        entity:
          name: plan
          type: foreign

      - name: spot_date
        dimension:
          type: time
        granularity: day

    metrics:
      - name: units_count
        description: "Total count of units."
        agg: sum

      - name: pitched_imps
        description: "Total impressions pitched."
        agg: sum

      - name: unit_price
        description: "Total unit price."
        agg: sum

metrics: ## advanced metrics

#Ratio type metric
  - name: "cpm"
    description: "unit price by impressions"
    label: "cpm"    
    type: derived
    expr: (unit_price/pitched_imps) * 1000
    input_metrics:
     - name : unit_price
     - name : pitched_imps
