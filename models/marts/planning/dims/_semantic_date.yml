version: 2

semantic_models:
  - name: dim_date
    description: "The time spine for semantic layer calculations."
    model: ref('dim_date')
    defaults:
      agg_time_dimension: date_actual
    entities:
      - name: date
        type: primary
        expr: date_actual
    dimensions:
      - name: date_actual
        type: time
        time_granularity: day