version: 2

models:
  - name: dim_plan
    description: "Plan dimension."

    semantic_model:
      enabled: true

    columns:

      # Primary Entity
      - name: plan_id
        entity:
          name: plan
          type: primary

      # Foreign Entities
      - name: channel_id
        entity:
          name: channel
          type: foreign

      - name: advertiser_id
        entity:
          name: advertiser
          type: foreign

      - name: agency_id
        entity:
          name: agency
          type: foreign

      - name: demo_id
        entity:
          name: demo
          type: foreign

      # Business Dimensions
      - name: plan_name
        dimension:
          type: categorical