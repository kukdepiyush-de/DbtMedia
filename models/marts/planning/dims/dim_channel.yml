version: 2

models:
  - name: dim_channel
    description: "Channel dimension."

    semantic_model:
      enabled: true

    columns:

      - name: channel_id
        entity:
          name: channel
          type: primary

      - name: division_id
        entity:
          name: division
          type: foreign

      - name: channel_name
        dimension:
          type: categorical